<!DOCTYPE HTML>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Card Timer</h1>

    <img id="cardImage" src="CB.png" alt="Card">

    <h2 id="timerDisplay">00:00</h2>
    
    <p id="message"></p>

    <img src="Start.png" onclick="startTimer()" style="height:10%; cursor:pointer;">

    <img src="Stop.png" onclick="stopTimer()" style="height:10%; cursor:pointer;">



    <script src="script.js"></script>


</body>

</html>
